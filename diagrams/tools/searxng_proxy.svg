<svg viewBox="0 0 600 268" xmlns="http://www.w3.org/2000/svg"
     font-family="Noto Sans CJK KR, sans-serif">

  <!-- 사용자 -->
  <rect x="24" y="120" width="92" height="44" rx="4" fill="#f5f5f5" stroke="#666" stroke-width="1.5"/>
  <text x="70" y="147" font-size="13" fill="#2a2a2a" text-anchor="middle">사용자</text>

  <!-- 검색어 화살표: 사용자 → SearXNG -->
  <g stroke="#5db0d7" stroke-width="2" fill="#5db0d7">
    <line x1="116" y1="142" x2="214" y2="142"/>
    <polygon points="226,142 214,136 214,148"/>
  </g>
  <text x="170" y="132" font-size="11" fill="#888" text-anchor="middle">검색어</text>

  <!-- SearXNG (프록시, 강조) -->
  <rect x="228" y="112" width="134" height="60" rx="4" fill="#e8f4fa" stroke="#5db0d7" stroke-width="2"/>
  <text x="295" y="138" font-size="13" font-weight="bold" fill="#2a2a2a" text-anchor="middle">SearXNG</text>
  <text x="295" y="157" font-size="11" fill="#888" text-anchor="middle">메타서치 프록시</text>

  <!-- 팬아웃 버스: SearXNG → 세 엔진 -->
  <g stroke="#5db0d7" stroke-width="2" fill="#5db0d7">
    <line x1="362" y1="142" x2="404" y2="142"/>
    <line x1="404" y1="70" x2="404" y2="214"/>
    <line x1="404" y1="70" x2="458" y2="70"/>
    <polygon points="470,70 458,64 458,76"/>
    <line x1="404" y1="142" x2="458" y2="142"/>
    <polygon points="470,142 458,136 458,148"/>
    <line x1="404" y1="214" x2="458" y2="214"/>
    <polygon points="470,214 458,208 458,220"/>
  </g>

  <!-- 상위 검색엔진 -->
  <g fill="#f5f5f5" stroke="#666" stroke-width="1.5">
    <rect x="470" y="52" width="106" height="36" rx="4"/>
    <rect x="470" y="124" width="106" height="36" rx="4"/>
    <rect x="470" y="196" width="106" height="36" rx="4"/>
  </g>
  <g font-size="13" fill="#2a2a2a" text-anchor="middle">
    <text x="523" y="75">Google</text>
    <text x="523" y="147">Bing</text>
    <text x="523" y="219">DuckDuckGo</text>
  </g>

  <!-- 캡션 -->
  <text x="300" y="256" font-size="11" fill="#888" text-anchor="middle">각 엔진에는 SearXNG의 요청만 보인다. 내 신원은 넘어가지 않고, 결과는 병합돼 돌아온다.</text>
</svg>
