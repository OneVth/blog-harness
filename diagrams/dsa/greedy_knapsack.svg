<svg viewBox="0 0 560 400" xmlns="http://www.w3.org/2000/svg"
     font-family="Noto Sans CJK KR, sans-serif">

  <!-- 제목 -->
  <text x="280" y="26" font-size="13" font-weight="bold" fill="#2a2a2a" text-anchor="middle">같은 물건, 용량 50 : 쪼갤 수 있으면 자투리 0, 통째로면 낭비</text>

  <!-- 무게 눈금 (왼쪽) -->
  <line x1="112" y1="80" x2="112" y2="330" stroke="#ddd" stroke-width="1"/>
  <text x="96" y="72" font-size="10" fill="#888" text-anchor="middle">무게</text>
  <g font-size="10" fill="#888" text-anchor="end">
    <text x="104" y="334">0</text>
    <text x="104" y="284">10</text>
    <text x="104" y="234">20</text>
    <text x="104" y="184">30</text>
    <text x="104" y="134">40</text>
    <text x="104" y="84">50</text>
  </g>

  <!-- 왼쪽 제목 -->
  <text x="165" y="55" font-size="13" font-weight="bold" fill="#2a2a2a" text-anchor="middle">분수 배낭</text>

  <!-- 왼쪽 채운 슬롯 -->
  <g stroke="#5db0d7" stroke-width="1.5" fill="#e8f4fa">
    <rect x="120" y="280" width="90" height="50"  rx="4"/>
    <rect x="120" y="180" width="90" height="100" rx="4"/>
    <rect x="120" y="80"  width="90" height="100" rx="4"/>
  </g>
  <g text-anchor="middle">
    <text x="165" y="301" font-size="12" fill="#2a2a2a">물건1</text>
    <text x="165" y="315" font-size="10" fill="#888">v60 · w10</text>
    <text x="165" y="226" font-size="12" fill="#2a2a2a">물건2</text>
    <text x="165" y="240" font-size="10" fill="#888">v100 · w20</text>
    <text x="165" y="126" font-size="12" fill="#2a2a2a">물건3 (2/3만)</text>
    <text x="165" y="140" font-size="10" fill="#888">v80 · w20</text>
  </g>
  <!-- 왼쪽 배낭 테두리 -->
  <rect x="120" y="80" width="90" height="250" rx="4" fill="none" stroke="#444" stroke-width="2"/>
  <text x="165" y="352" font-size="12" font-weight="bold" fill="#ff5544" text-anchor="middle">합계 240 = 최적</text>
  <text x="165" y="368" font-size="11" fill="#888" text-anchor="middle">자투리 0</text>

  <!-- 오른쪽 제목 -->
  <text x="395" y="55" font-size="13" font-weight="bold" fill="#2a2a2a" text-anchor="middle">0/1 배낭</text>

  <!-- 오른쪽 채운 슬롯 -->
  <g stroke="#5db0d7" stroke-width="1.5" fill="#e8f4fa">
    <rect x="350" y="280" width="90" height="50"  rx="4"/>
    <rect x="350" y="180" width="90" height="100" rx="4"/>
  </g>
  <!-- 오른쪽 자투리 -->
  <rect x="350" y="80" width="90" height="100" rx="4" fill="#ffe4e0" stroke="#ff5544" stroke-width="2" stroke-dasharray="4,3"/>
  <g text-anchor="middle">
    <text x="395" y="301" font-size="12" fill="#2a2a2a">물건1</text>
    <text x="395" y="315" font-size="10" fill="#888">v60 · w10</text>
    <text x="395" y="226" font-size="12" fill="#2a2a2a">물건2</text>
    <text x="395" y="240" font-size="10" fill="#888">v100 · w20</text>
    <text x="395" y="126" font-size="12" font-weight="bold" fill="#ff5544">자투리 20</text>
    <text x="395" y="141" font-size="10" fill="#888">물건3 안 들어감 (w30 &gt; 20)</text>
  </g>
  <!-- 오른쪽 배낭 테두리 -->
  <rect x="350" y="80" width="90" height="250" rx="4" fill="none" stroke="#444" stroke-width="2"/>
  <text x="395" y="352" font-size="12" font-weight="bold" fill="#2a2a2a" text-anchor="middle">합계 160</text>
  <text x="395" y="368" font-size="11" fill="#888" text-anchor="middle">남은 20 낭비</text>

  <!-- 캡션 -->
  <text x="280" y="390" font-size="11" fill="#888" text-anchor="middle">쪼갤 수 있으면 물건3을 2/3 잘라 남는 무게를 0으로 만든다. 통째로만 담으면 못 채운다.</text>
</svg>
