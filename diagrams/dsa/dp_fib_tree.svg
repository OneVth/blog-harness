<svg viewBox="0 0 600 340" xmlns="http://www.w3.org/2000/svg"
     font-family="Noto Sans CJK KR, sans-serif">

  <!-- 연결선 먼저 (노드가 덮는다) -->
  <g stroke="#666" stroke-width="1.5">
    <line x1="325" y1="50"  x2="190" y2="120"/>
    <line x1="325" y1="50"  x2="460" y2="120"/>
    <line x1="190" y1="120" x2="110" y2="190"/>
    <line x1="190" y1="120" x2="270" y2="190"/>
    <line x1="460" y1="120" x2="390" y2="190"/>
    <line x1="460" y1="120" x2="530" y2="190"/>
    <line x1="110" y1="190" x2="70"  y2="260"/>
    <line x1="110" y1="190" x2="150" y2="260"/>
  </g>

  <!-- 일반 노드 -->
  <g fill="#f5f5f5" stroke="#666" stroke-width="1.5">
    <circle cx="325" cy="50"  r="26"/>
    <circle cx="190" cy="120" r="26"/>
    <circle cx="460" cy="120" r="26"/>
    <circle cx="110" cy="190" r="26"/>
    <circle cx="530" cy="190" r="26"/>
    <circle cx="150" cy="260" r="26"/>
  </g>

  <!-- 중복 노드: fib(2) 세 번 (강조) -->
  <g fill="#ffe4e0" stroke="#ff5544" stroke-width="2">
    <circle cx="270" cy="190" r="26"/>
    <circle cx="390" cy="190" r="26"/>
    <circle cx="70"  cy="260" r="26"/>
  </g>

  <!-- 노드 라벨 -->
  <g font-size="12" fill="#2a2a2a" text-anchor="middle">
    <text x="325" y="54">fib(5)</text>
    <text x="190" y="124">fib(4)</text>
    <text x="460" y="124">fib(3)</text>
    <text x="110" y="194">fib(3)</text>
    <text x="530" y="194">fib(1)</text>
    <text x="150" y="264">fib(1)</text>
  </g>
  <g font-size="12" fill="#ff5544" font-weight="bold" text-anchor="middle">
    <text x="270" y="194">fib(2)</text>
    <text x="390" y="194">fib(2)</text>
    <text x="70"  y="264">fib(2)</text>
  </g>

  <!-- 캡션 -->
  <text x="300" y="318" font-size="11" fill="#888" text-anchor="middle">색칠한 fib(2)가 세 번 반복된다. 이런 중복이 쌓여 naive 호출이 지수로 불어난다.</text>
</svg>
