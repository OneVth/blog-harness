<svg viewBox="0 0 560 220" xmlns="http://www.w3.org/2000/svg"
     font-family="Noto Sans CJK KR, sans-serif">

  <!-- 인덱스 라벨 -->
  <g font-size="11" fill="#aaa" text-anchor="middle">
    <text x="67" y="50">0</text>
    <text x="121" y="50">1</text>
    <text x="175" y="50">2</text>
    <text x="229" y="50">3</text>
    <text x="283" y="50">4</text>
    <text x="337" y="50">5</text>
    <text x="391" y="50">6</text>
    <text x="445" y="50">7</text>
    <text x="499" y="50">8</text>
  </g>

  <!-- a 행 -->
  <g fill="#f5f5f5" stroke="#666" stroke-width="1.5">
    <rect x="40"  y="58" width="54" height="40" rx="4"/>
    <rect x="94"  y="58" width="54" height="40" rx="4"/>
    <rect x="148" y="58" width="54" height="40" rx="4"/>
    <rect x="202" y="58" width="54" height="40" rx="4"/>
    <rect x="256" y="58" width="54" height="40" rx="4"/>
    <rect x="310" y="58" width="54" height="40" rx="4"/>
    <rect x="364" y="58" width="54" height="40" rx="4"/>
    <rect x="418" y="58" width="54" height="40" rx="4"/>
    <rect x="472" y="58" width="54" height="40" rx="4"/>
  </g>

  <!-- dp 행 -->
  <g fill="white" stroke="#666" stroke-width="1.5">
    <rect x="40"  y="110" width="54" height="40" rx="4"/>
    <rect x="94"  y="110" width="54" height="40" rx="4"/>
    <rect x="148" y="110" width="54" height="40" rx="4"/>
    <rect x="256" y="110" width="54" height="40" rx="4"/>
    <rect x="310" y="110" width="54" height="40" rx="4"/>
    <rect x="418" y="110" width="54" height="40" rx="4"/>
    <rect x="472" y="110" width="54" height="40" rx="4"/>
  </g>
  <!-- dp[3] 리셋 (주황 테두리) -->
  <rect x="202" y="110" width="54" height="40" rx="4" fill="white" stroke="#ff5544" stroke-width="2"/>
  <!-- dp[6] 최댓값 (주황 채움) -->
  <rect x="364" y="110" width="54" height="40" rx="4" fill="#ffe4e0" stroke="#ff5544" stroke-width="2"/>

  <!-- 행 이름 -->
  <text x="24" y="83"  font-size="13" font-weight="bold" fill="#888" text-anchor="middle">a</text>
  <text x="20" y="135" font-size="13" font-weight="bold" fill="#888" text-anchor="middle">dp</text>

  <!-- a 값 -->
  <g font-size="13" fill="#2a2a2a" text-anchor="middle">
    <text x="67"  y="83">-2</text>
    <text x="121" y="83">1</text>
    <text x="175" y="83">-3</text>
    <text x="229" y="83">4</text>
    <text x="283" y="83">-1</text>
    <text x="337" y="83">2</text>
    <text x="391" y="83">1</text>
    <text x="445" y="83">-5</text>
    <text x="499" y="83">4</text>
  </g>
  <!-- dp 값 -->
  <g font-size="13" fill="#2a2a2a" text-anchor="middle">
    <text x="67"  y="135">-2</text>
    <text x="121" y="135">1</text>
    <text x="175" y="135">-2</text>
    <text x="229" y="135" fill="#ff5544" font-weight="bold">4</text>
    <text x="283" y="135">3</text>
    <text x="337" y="135">5</text>
    <text x="391" y="135" fill="#ff5544" font-weight="bold">6</text>
    <text x="445" y="135">1</text>
    <text x="499" y="135">5</text>
  </g>

  <!-- 강조 라벨 -->
  <text x="229" y="170" font-size="11" fill="#ff5544" text-anchor="middle">리셋 (앞을 버림)</text>
  <text x="391" y="170" font-size="11" fill="#ff5544" text-anchor="middle">최댓값</text>

  <!-- 캡션 -->
  <text x="280" y="200" font-size="11" fill="#888" text-anchor="middle">dp[i] = i에서 끝나는 최대 부분합. 누적이 음수면 버리고 새로 시작한다. 답 = max(dp) = 6.</text>
</svg>
