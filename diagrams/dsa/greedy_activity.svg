<svg viewBox="0 0 560 380" xmlns="http://www.w3.org/2000/svg"
     font-family="Noto Sans CJK KR, sans-serif">

  <!-- 제목 -->
  <text x="280" y="26" font-size="13" font-weight="bold" fill="#2a2a2a" text-anchor="middle">활동 선택 (D 기준) : 가장 일찍 끝나는 것부터 채택</text>

  <!-- 시간 격자 (세로 눈금선) -->
  <g stroke="#eee" stroke-width="1">
    <line x1="78"  y1="42" x2="78"  y2="320"/>
    <line x1="142" y1="42" x2="142" y2="320"/>
    <line x1="206" y1="42" x2="206" y2="320"/>
    <line x1="270" y1="42" x2="270" y2="320"/>
    <line x1="334" y1="42" x2="334" y2="320"/>
    <line x1="398" y1="42" x2="398" y2="320"/>
    <line x1="462" y1="42" x2="462" y2="320"/>
    <line x1="526" y1="42" x2="526" y2="320"/>
  </g>

  <!-- 탈락 활동 (회색) -->
  <g fill="#f5f5f5" stroke="#bbb" stroke-width="1.5">
    <rect x="174" y="73"  width="64"  height="16" rx="4"/>
    <rect x="78"  y="98"  width="192" height="16" rx="4"/>
    <rect x="174" y="148" width="192" height="16" rx="4"/>
    <rect x="238" y="173" width="128" height="16" rx="4"/>
    <rect x="270" y="198" width="128" height="16" rx="4"/>
    <rect x="334" y="248" width="128" height="16" rx="4"/>
    <rect x="142" y="273" width="352" height="16" rx="4"/>
  </g>

  <!-- 채택 활동 (주황) -->
  <g fill="#ffe4e0" stroke="#ff5544" stroke-width="2">
    <rect x="110" y="48"  width="96" height="16" rx="4"/>
    <rect x="238" y="123" width="64" height="16" rx="4"/>
    <rect x="334" y="223" width="96" height="16" rx="4"/>
    <rect x="462" y="298" width="64" height="16" rx="4"/>
  </g>

  <!-- 채택 순서 원문자 -->
  <g font-size="12" font-weight="bold" fill="#ff5544" text-anchor="middle">
    <text x="158" y="61">①</text>
    <text x="270" y="136">②</text>
    <text x="382" y="236">③</text>
    <text x="494" y="311">④</text>
  </g>

  <!-- 구간 라벨 (왼쪽 열) -->
  <g font-size="11" text-anchor="middle">
    <text x="36" y="60"  fill="#ff5544" font-weight="bold">(1,4)</text>
    <text x="36" y="85"  fill="#aaa">(3,5)</text>
    <text x="36" y="110" fill="#aaa">(0,6)</text>
    <text x="36" y="135" fill="#ff5544" font-weight="bold">(5,7)</text>
    <text x="36" y="160" fill="#aaa">(3,9)</text>
    <text x="36" y="185" fill="#aaa">(5,9)</text>
    <text x="36" y="210" fill="#aaa">(6,10)</text>
    <text x="36" y="235" fill="#ff5544" font-weight="bold">(8,11)</text>
    <text x="36" y="260" fill="#aaa">(8,12)</text>
    <text x="36" y="285" fill="#aaa">(2,13)</text>
    <text x="36" y="310" fill="#ff5544" font-weight="bold">(12,14)</text>
  </g>

  <!-- 시간축 -->
  <line x1="78" y1="326" x2="526" y2="326" stroke="#888" stroke-width="1.5"/>
  <g font-size="10" fill="#888" text-anchor="middle">
    <text x="78"  y="340">0</text>
    <text x="142" y="340">2</text>
    <text x="206" y="340">4</text>
    <text x="270" y="340">6</text>
    <text x="334" y="340">8</text>
    <text x="398" y="340">10</text>
    <text x="462" y="340">12</text>
    <text x="526" y="340">14</text>
  </g>

  <!-- 캡션 -->
  <text x="280" y="366" font-size="11" fill="#888" text-anchor="middle">종료 시각 순으로 훑으며 직전 선택과 안 겹치면 채택. 선택 (1,4)(5,7)(8,11)(12,14) = 4개.</text>
</svg>
